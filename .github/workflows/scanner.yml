name: Overnight Bounty Scanner

on:
  # Allows you to run this manually from the "Actions" tab
  workflow_dispatch:
  
  # Runs automatically every day at 2:00 AM IST (20:30 UTC)
  schedule:
    - cron: '30 20 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth urllib3

      - name: Run Dashboard Scanner
        env:
          # This pulls the secrets you saved in GitHub Settings
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_CREDS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDS_JSON }}
        run: python check_dashboards.py

      - name: Keep Workflow Active
        # GitHub disables scheduled workflows if the repo is inactive for 60 days.
        # This small step keeps it "alive."
        uses: gautamkrishnar/keepalive-workflow@v1
