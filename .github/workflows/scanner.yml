name: Overnight Bounty Scanner

on:
  # Allows you to trigger the scan manually AND provide inputs
  workflow_dispatch:
    inputs:
      target_tags:
        description: 'Dashboards to scan (e.g., grafana, jenkins, all)'
        required: true
        default: 'all'
        type: string
  
  # Runs automatically at 2:00 AM IST (20:30 UTC)
  schedule:
    - cron: '30 20 * * *'

jobs:
  bounty-hunt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests gspread google-auth urllib3 python-dotenv

      - name: Run Dashboard Scanner
        env:
          # Pulls the secrets from your GitHub repository settings
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_CREDS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDS_JSON }}
        # If triggered manually, it uses your input. If run by the cron schedule, it defaults to 'all'.
        run: python check_dashboards.py --tags "${{ inputs.target_tags || 'all' }}"

      - name: Keep Workflow Active
        uses: gautamkrishnar/keepalive-workflow@v1
